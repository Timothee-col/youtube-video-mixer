[phases.setup]
aptPkgs = [
    "build-essential",
    "cmake",
    "libopenblas-dev",
    "liblapack-dev",
    "libx11-dev",
    "libgtk2.0-dev",
    "libboost-all-dev",
    "libglib2.0-0",
    "libsm6",
    "libxext6",
    "libxrender-dev",
    "libgomp1",
    "ffmpeg"
]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install cmake",
    "pip install dlib",
    "pip install -r requirements.txt"
]

[start]
cmd = "streamlit run youtube_mixer.py --server.port=$PORT --server.address=0.0.0.0"